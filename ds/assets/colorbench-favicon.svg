<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" shape-rendering="crispEdges">
  <title>Colorbench · favicon (chip stack)</title>

  <!-- Opaque dark background -->
  <rect width="32" height="32" fill="#111110"/>

  <!-- Three stacked chips — centered, no offset (more legible at 16×16 than the
       offset version in the full brand mark) -->

  <!-- Chip 1 (gold) — top -->
  <rect x="5" y="6"  width="22" height="5" fill="#f5a524"/>
  <rect x="5" y="6"  width="22" height="1" fill="#a66a0c"/>
  <rect x="6" y="8"  width="2"  height="2" fill="#ffd37a"/>

  <!-- Chip 2 (paper) — middle -->
  <rect x="5" y="13" width="22" height="5" fill="#f7f6f5"/>
  <rect x="5" y="13" width="22" height="1" fill="#b0aea7"/>
  <rect x="6" y="15" width="2"  height="2" fill="#ffffff"/>

  <!-- Chip 3 (red, the spotlight) — bottom -->
  <rect x="5" y="20" width="22" height="5" fill="#e51b10"/>
  <rect x="5" y="20" width="22" height="1" fill="#9a0a03"/>
  <rect x="6" y="22" width="2"  height="2" fill="#ff8780"/>
</svg>
